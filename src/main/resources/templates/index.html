<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Pantay-pantay na width para sa labels para naka-align ang mga inputs */
        .module-label {
            width: 75px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #6c757d;
            display: inline-block;
        }
        /* Fixed width para sa mga buttons para magkakasing-haba sila */
        .btn-action {
            width: 110px;
        }
        /* Fixed width para sa input boxes */
        .input-qty {
            width: 80px !important;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">Inventory Management System</h2>

    <div class="row">
        <div class="col-md-3">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Product Entry</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/saveProduct}" th:object="${newProduct}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required placeholder="Item name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Initial Stock</label>
                            <input type="number" th:field="*{stockQuantity}" class="form-control" required min="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" required min="0">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Product</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Inventory & Sales Report</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th style="width: 50px;">ID</th>
                                <th>Product Name</th>
                                <th style="width: 120px;">Current Stock</th>
                                <th style="width: 120px;">Price</th>
                                <th style="width: 320px;" class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="product : ${listProducts}">
                                <td th:text="${product.id}"></td>
                                <td th:text="${product.name}" class="fw-bold"></td>
                                <td>
                                    <span th:text="${product.stockQuantity}"
                                          th:classappend="${product.stockQuantity <= 10} ? 'badge bg-danger' : 'badge bg-success'">
                                    </span>
                                </td>
                                <td th:text="'₱' + ${product.price}"></td>
                                <td>
                                    <div class="d-flex flex-column gap-2 border-start ps-3">
                                        <form th:action="@{/updateStock}" method="POST" class="d-flex align-items-center justify-content-between">
                                            <span class="module-label">Tracking</span>
                                            <input type="hidden" name="productId" th:value="${product.id}">
                                            <input type="number" name="newQuantity" th:value="${product.stockQuantity}" class="form-control form-control-sm input-qty mx-2">
                                            <button type="submit" class="btn btn-sm btn-info text-white btn-action">Update Total</button>
                                        </form>

                                        <form th:action="@{/sellProduct}" method="POST" class="d-flex align-items-center justify-content-between">
                                            <span class="module-label">Sales</span>
                                            <input type="hidden" name="productId" th:value="${product.id}">
                                            <input type="number" name="quantity" value="1" min="1" class="form-control form-control-sm input-qty mx-2">
                                            <button type="submit" class="btn btn-sm btn-danger btn-action">Deduct Sale</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <p th:if="${#lists.isEmpty(listProducts)}" class="text-center text-muted mt-3">No products found in the database.</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
<footer class="mt-5 py-4 bg-dark text-white text-center shadow">
    <div class="container">
        <h6>© 2026 Inventory Management System</h6>
        <p class="small mb-0 text-secondary">Final Project by Group Inventory Management System</p>
    </div>
</footer>

</html>
